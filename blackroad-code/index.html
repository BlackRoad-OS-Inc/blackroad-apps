<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>💻 Code Editor - BlackRoad OS</title>
    <link rel="manifest" href="manifest.json">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #9D84B7 0%, #667eea 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            padding: 20px;
        }
        
        .container {
            text-align: center;
            max-width: 600px;
            animation: fadeIn 0.8s ease;
        }
        
        .icon {
            font-size: 120px;
            margin-bottom: 30px;
            animation: bounce 2s infinite;
        }
        
        h1 {
            font-size: 48px;
            margin-bottom: 20px;
        }
        
        .description {
            font-size: 20px;
            opacity: 0.9;
            line-height: 1.6;
            margin-bottom: 40px;
        }
        
        .features {
            background: rgba(255, 255, 255, 0.1);
            padding: 30px;
            border-radius: 15px;
            backdrop-filter: blur(10px);
            margin-bottom: 30px;
        }
        
        .features h2 {
            font-size: 24px;
            margin-bottom: 20px;
        }
        
        .feature {
            padding: 15px;
            text-align: left;
            margin-bottom: 10px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
        }
        
        .cta {
            display: inline-block;
            padding: 15px 40px;
            background: white;
            color: #9D84B7;
            border-radius: 10px;
            text-decoration: none;
            font-weight: bold;
            font-size: 18px;
            transition: transform 0.3s ease;
        }
        
        .cta:hover {
            transform: scale(1.05);
        }
        
        .badge {
            display: inline-block;
            margin-top: 20px;
            padding: 10px 20px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 20px;
            font-size: 14px;
        }
        
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="icon">💻</div>
        <h1>Code Editor</h1>
        <div class="description">Collaborative code editor with live sharing</div>
        
        <div class="features">
            <h2>✨ Features</h2>
            <div class="feature">🚀 Lightning fast performance</div>
            <div class="feature">🔐 End-to-end encrypted</div>
            <div class="feature">☁️ Cloud sync across devices</div>
            <div class="feature">🌙 Dark mode included</div>
            <div class="feature">📱 Works on all platforms</div>
        </div>
        
        <a href="#" class="cta" onclick="alert('Coming soon! Install from BlackRoad OS App Store'); return false;">
            Get Started
        </a>
        
        <div class="badge">
            ✅ Published on BlackRoad OS
        </div>
    </div>
</body>
</html>
