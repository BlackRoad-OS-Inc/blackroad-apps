<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Habit Builder - BlackRoad OS</title>
    <link rel="manifest" href="manifest.json">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #BA55D3 0%, #667eea 100%);
            min-height: 100vh;
            color: white;
        }
        
        .header {
            padding: 30px;
            text-align: center;
            background: rgba(0, 0, 0, 0.2);
            backdrop-filter: blur(10px);
        }
        
        .icon {
            font-size: 80px;
            margin-bottom: 15px;
            animation: float 3s ease-in-out infinite;
        }
        
        h1 {
            font-size: 36px;
            margin-bottom: 10px;
        }
        
        .tagline {
            opacity: 0.9;
            font-size: 18px;
        }
        
        .main {
            max-width: 1000px;
            margin: 40px auto;
            padding: 0 20px;
        }
        
        .demo-section {
            background: rgba(255, 255, 255, 0.95);
            color: #333;
            padding: 40px;
            border-radius: 20px;
            margin-bottom: 30px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
        }
        
        .demo-section h2 {
            color: #BA55D3;
            margin-bottom: 20px;
            font-size: 28px;
        }
        
        .interactive-demo {
            padding: 30px;
            background: #f8f9fa;
            border-radius: 15px;
            margin: 20px 0;
        }
        
        .demo-input {
            width: 100%;
            padding: 15px;
            border: 2px solid #BA55D3;
            border-radius: 10px;
            font-size: 16px;
            margin-bottom: 15px;
        }
        
        .demo-button {
            background: #BA55D3;
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 10px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s;
        }
        
        .demo-button:hover {
            transform: scale(1.05);
        }
        
        .demo-output {
            margin-top: 20px;
            padding: 20px;
            background: white;
            border-radius: 10px;
            min-height: 60px;
            border: 2px solid #e0e0e0;
        }
        
        .features-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin: 30px 0;
        }
        
        .feature {
            background: white;
            padding: 20px;
            border-radius: 15px;
            text-align: center;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
        }
        
        .feature-icon {
            font-size: 36px;
            margin-bottom: 10px;
        }
        
        .pricing {
            background: rgba(0, 0, 0, 0.2);
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            backdrop-filter: blur(10px);
            margin-top: 40px;
        }
        
        .price {
            font-size: 48px;
            font-weight: bold;
            margin: 20px 0;
        }
        
        .install-button {
            display: inline-block;
            background: white;
            color: #BA55D3;
            padding: 20px 50px;
            border-radius: 15px;
            text-decoration: none;
            font-weight: bold;
            font-size: 20px;
            margin-top: 20px;
            transition: transform 0.3s;
        }
        
        .install-button:hover {
            transform: scale(1.1);
        }
        
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="icon">✨</div>
        <h1>Habit Builder</h1>
        <div class="tagline">Build positive habits daily</div>
    </div>
    
    <div class="main">
        <div class="demo-section">
            <h2>🎯 Try It Now!</h2>
            <div class="interactive-demo">
                <input type="text" class="demo-input" placeholder="Enter something..." id="demoInput">
                <button class="demo-button" onclick="runDemo()">Run Demo</button>
                <div class="demo-output" id="output">
                    <em>Results will appear here...</em>
                </div>
            </div>
        </div>
        
        <div class="demo-section">
            <h2>✨ Features</h2>
            <div class="features-grid">
                <div class="feature">
                    <div class="feature-icon">⚡</div>
                    <strong>Lightning Fast</strong>
                </div>
                <div class="feature">
                    <div class="feature-icon">🔒</div>
                    <strong>Secure</strong>
                </div>
                <div class="feature">
                    <div class="feature-icon">☁️</div>
                    <strong>Cloud Sync</strong>
                </div>
                <div class="feature">
                    <div class="feature-icon">📱</div>
                    <strong>Mobile First</strong>
                </div>
            </div>
        </div>
    </div>
    
    <div class="pricing">
        <h2>💰 Pricing</h2>
        <div class="price">$4.99/mo</div>
        <p>Free 14-day trial • Cancel anytime</p>
        <a href="#" class="install-button" onclick="alert('Coming soon! Install from BlackRoad OS App Store'); return false;">
            Install Now
        </a>
    </div>
    
    <script>
        function runDemo() {
            const input = document.getElementById('demoInput').value;
            const output = document.getElementById('output');
            
            if (!input) {
                output.innerHTML = '<em style="color: #ff6b6b;">Please enter something!</em>';
                return;
            }
            
            output.innerHTML = `
                <strong>✅ Success!</strong><br><br>
                Input: <code>${input}</code><br><br>
                <em>Habit Builder is processing your request...</em><br>
                <small style="color: #666;">This is a demo. Full features coming soon!</small>
            `;
        }
        
        // Auto-focus input
        document.getElementById('demoInput').focus();
    </script>
</body>
</html>
