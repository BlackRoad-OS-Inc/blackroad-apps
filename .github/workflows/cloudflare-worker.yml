name: Cloudflare Workers

on:
  push:
    branches: [main, master]
    paths:
      - "workers/**"
  workflow_dispatch:
    inputs:
      worker:
        description: "Worker to deploy (all, health-monitor, task-runner)"
        required: false
        default: "all"

permissions:
  contents: read

jobs:
  deploy-workers:
    name: Deploy Cloudflare Workers
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        worker: [health-monitor, task-runner]
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "20"

      - name: Deploy worker
        uses: cloudflare/wrangler-action@da0e0cd62e1941b3e1c113337e06b38ceea60e49 # v3.14.0
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: workers/${{ matrix.worker }}
          command: deploy
