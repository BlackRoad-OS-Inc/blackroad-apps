name: Auto Deploy

on:
  push:
    branches: [main, master]
  workflow_dispatch:
    inputs:
      target:
        description: "Deploy target (cloudflare, railway, all)"
        required: false
        default: "all"

permissions:
  contents: read
  deployments: write

env:
  NODE_VERSION: "20"

jobs:
  detect-changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      static_changed: ${{ steps.changes.outputs.static }}
      roadmap_changed: ${{ steps.changes.outputs.roadmap }}
      roadcoin_changed: ${{ steps.changes.outputs.roadcoin }}
      node_changed: ${{ steps.changes.outputs.node }}
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 2

      - name: Detect changed paths
        id: changes
        run: |
          CHANGED=$(git diff --name-only HEAD~1 HEAD 2>/dev/null || echo "all")
          if echo "$CHANGED" | grep -q "^index.html\|^blackroad-"; then
            echo "static=true" >> $GITHUB_OUTPUT
          else
            echo "static=false" >> $GITHUB_OUTPUT
          fi
          if echo "$CHANGED" | grep -q "^roadmap/"; then
            echo "roadmap=true" >> $GITHUB_OUTPUT
          else
            echo "roadmap=false" >> $GITHUB_OUTPUT
          fi
          if echo "$CHANGED" | grep -q "^roadcoin/"; then
            echo "roadcoin=true" >> $GITHUB_OUTPUT
          else
            echo "roadcoin=false" >> $GITHUB_OUTPUT
          fi
          if echo "$CHANGED" | grep -qE "^(roadwork|roadside|roadview)/"; then
            echo "node=true" >> $GITHUB_OUTPUT
          else
            echo "node=false" >> $GITHUB_OUTPUT
          fi

  deploy-static:
    name: Deploy Static (Cloudflare Pages)
    needs: detect-changes
    if: needs.detect-changes.outputs.static_changed == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@da0e0cd62e1941b3e1c113337e06b38ceea60e49 # v3.14.0
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy . --project-name=blackroad-apps
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

  deploy-railway:
    name: Deploy Services (Railway)
    needs: detect-changes
    if: >
      needs.detect-changes.outputs.roadmap_changed == 'true' ||
      needs.detect-changes.outputs.roadcoin_changed == 'true' ||
      needs.detect-changes.outputs.node_changed == 'true' ||
      github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Install Railway CLI
        run: npm i -g @railway/cli@3.22.0

      - name: Deploy to Railway
        run: railway up --service ${{ github.event.repository.name }}
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}

  health-check:
    name: Post-Deploy Health Check
    needs: [deploy-static, deploy-railway]
    if: always() && (needs.deploy-static.result == 'success' || needs.deploy-railway.result == 'success')
    runs-on: ubuntu-latest
    steps:
      - name: Wait for propagation
        run: sleep 30

      - name: Health check
        run: |
          if [ -n "${{ secrets.DEPLOY_URL }}" ]; then
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "${{ secrets.DEPLOY_URL }}" || echo "000")
            echo "Health check status: $STATUS"
            if [ "$STATUS" -lt 200 ] || [ "$STATUS" -ge 400 ]; then
              echo "Health check returned non-success status"
              exit 1
            fi
          else
            echo "DEPLOY_URL not configured, skipping health check"
          fi
