name: Self-Healing

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:
  workflow_run:
    workflows: ["Auto Deploy"]
    types: [completed]

permissions:
  contents: write
  issues: write

jobs:
  monitor:
    name: Monitor Deployments
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Health check
        id: health
        run: |
          if [ -n "${{ secrets.DEPLOY_URL }}" ]; then
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "${{ secrets.DEPLOY_URL }}" --max-time 30 || echo "000")
            echo "status=$STATUS" >> $GITHUB_OUTPUT
            echo "Health check: $STATUS"
          else
            echo "status=skip" >> $GITHUB_OUTPUT
            echo "DEPLOY_URL not set, skipping"
          fi

      - name: Report failure
        if: steps.health.outputs.status != '200' && steps.health.outputs.status != 'skip' && steps.health.outputs.status != '301' && steps.health.outputs.status != '302'
        uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea # v7.0.1
        with:
          script: |
            const existing = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: 'deployment,auto-generated',
              state: 'open'
            });
            if (existing.data.length === 0) {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: 'Deployment Health Check Failed (Status: ${{ steps.health.outputs.status }})',
                body: [
                  '## Deployment Health Check Failed',
                  '',
                  '- **Status Code:** ${{ steps.health.outputs.status }}',
                  '- **Workflow Run:** ' + context.runId,
                  '- **Timestamp:** ' + new Date().toISOString(),
                  '',
                  'The self-healing monitor detected a deployment issue.',
                  'Please investigate and redeploy if necessary.'
                ].join('\n'),
                labels: ['bug', 'deployment', 'auto-generated']
              });
            }

  stale-issues:
    name: Manage Stale Issues
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule'
    steps:
      - name: Close stale auto-generated issues
        uses: actions/stale@5bef64f19d7facfb25b37b414482c7164d639639 # v9.1.0
        with:
          stale-issue-label: stale
          stale-issue-message: "This auto-generated issue has been inactive and will be closed soon."
          days-before-issue-stale: 7
          days-before-issue-close: 3
          only-labels: auto-generated
