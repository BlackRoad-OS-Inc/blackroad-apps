name: Security Scan

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  schedule:
    - cron: "0 6 * * 1"
  workflow_dispatch:

permissions:
  contents: read
  security-events: write
  actions: read

jobs:
  codeql:
    name: CodeQL Analysis
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        language: ["javascript-typescript", "python"]
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Initialize CodeQL
        uses: github/codeql-action/init@ff0a06e83cb2de871e5a09832bc6a81e7276941f # v3.28.18
        with:
          languages: ${{ matrix.language }}

      - name: Autobuild
        uses: github/codeql-action/autobuild@ff0a06e83cb2de871e5a09832bc6a81e7276941f # v3.28.18

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@ff0a06e83cb2de871e5a09832bc6a81e7276941f # v3.28.18

  dependency-scan:
    name: Dependency Audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Dependency Review
        if: github.event_name == 'pull_request'
        uses: actions/dependency-review-action@da24556b548a50705dd671f47852072ea4c105d9 # v4.7.1

      - name: npm audit (roadmap)
        working-directory: roadmap
        run: npm install --ignore-scripts && npm audit --audit-level=high || true

      - name: pip audit (roadcoin)
        working-directory: roadcoin
        run: |
          pip install pip-audit
          pip-audit -r requirements.txt || true

  secret-scan:
    name: Secret Detection
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0

      - name: Scan for secrets
        run: |
          echo "Scanning for hardcoded secrets..."
          FOUND=0
          for pattern in "AKIA[0-9A-Z]{16}" "sk_live_[a-zA-Z0-9]+" "ghp_[a-zA-Z0-9]{36}" "-----BEGIN (RSA |EC )?PRIVATE KEY-----"; do
            if grep -rn --include="*.js" --include="*.ts" --include="*.py" --include="*.go" --include="*.rs" --include="*.json" -E "$pattern" . 2>/dev/null | grep -v node_modules | grep -v ".git/"; then
              echo "Potential secret found matching: $pattern"
              FOUND=$((FOUND + 1))
            fi
          done
          if [ $FOUND -gt 0 ]; then
            echo "WARNING: $FOUND potential secret patterns detected"
            exit 1
          fi
          echo "No secrets detected."
